<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Fast Login</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body class="theme-pink">
    <div class="header">
        <h2 id="appTitle">Fast Login</h2>
        <div class="header-controls">

            <!-- Botão de Tema -->
            <button id="colorToggle" class="icon-btn" title="Alternar Cor do Tema">
                <!-- Icone de Paleta (Formato Rim) -->
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M12 21a9 9 0 1 1 0 -18a9 8 0 0 1 9 8a4.5 4 0 0 1 -4.5 4h-2.5a2 2 0 0 0 -1 3.75a1.3 1.3 0 0 1 -1 2.25">
                    </path>
                    <circle cx="7.5" cy="10.5" r="1" fill="currentColor" stroke="none"></circle>
                    <circle cx="12" cy="7.5" r="1" fill="currentColor" stroke="none"></circle>
                    <circle cx="16.5" cy="10.5" r="1" fill="currentColor" stroke="none"></circle>
                </svg>
            </button>

            <!-- Botão de Modo Escuro -->
            <button id="themeToggle" class="icon-btn" title="Toggle Dark Mode">
                <!-- Ícone de Lua -->
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </div>

    <!-- Profile List Container -->
    <div id="profileList" class="profile-list">
        <!-- Javascript will populate this -->
        <div class="empty-state">Nenhum perfil encontrado. Adicione um abaixo!</div>
    </div>

    <!-- Add Profile Button -->
    <button id="addProfileBtn" class="main-action-btn">Add a profile</button>

    <!-- Editor Section (Hidden by default) -->
    <div id="editorSection" class="editor-section hidden">
        <h3>Manage Profile</h3>

        <input type="hidden" id="editIndex" value="-1">

        <div class="form-group">
            <label>Profile Name</label>
            <input type="text" id="profileName" placeholder="e.g. Test1">
        </div>

        <div class="form-group">
            <label>Project</label>
            <select id="projectSelect">
                <option value="visitador">Visitador</option>
            </select>
        </div>

        <div class="form-group">
            <label>Login URL</label>
            <input type="text" id="loginUrl" value="http://localhost:3000">
        </div>

        <div class="form-group">
            <label>Email URL</label>
            <input type="text" id="emailUrl" value="https://mail.google.com">
        </div>

        <div class="form-group">
            <label>Login (Email)</label>
            <input type="text" id="loginInput" placeholder="email@example.com">
        </div>



        <div class="info-group">
            Password: <span id="passwordDisplay"></span>
        </div>

        <div class="editor-actions">
            <button id="cancelBtn" class="secondary-btn">Cancel</button>
            <button id="saveBtn" class="primary-btn">Save Profile</button>
        </div>
    </div>

    <div id="status" class="status-msg"></div>

    <script src="popup.js"></script>
</body>

</html>
