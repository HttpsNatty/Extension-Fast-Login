<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Fast Login</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body class="theme-pink">
    <div class="header">
        <h2 id="appTitle">Fast Login</h2>
        <div class="header-controls">
            <!-- Botão de Idioma -->
            <button id="langToggle" class="icon-btn" title="Switch Language">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                    <path
                        d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z">
                    </path>
                </svg>
            </button>

            <!-- Botão de Tema -->
            <button id="colorToggle" class="icon-btn" title="Alternar Cor do Tema">
                <!-- Icone de Paleta (Formato Rim) -->
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M12 21a9 9 0 1 1 0 -18a9 8 0 0 1 9 8a4.5 4 0 0 1 -4.5 4h-2.5a2 2 0 0 0 -1 3.75a1.3 1.3 0 0 1 -1 2.25">
                    </path>
                    <circle cx="7.5" cy="10.5" r="1" fill="currentColor" stroke="none"></circle>
                    <circle cx="12" cy="7.5" r="1" fill="currentColor" stroke="none"></circle>
                    <circle cx="16.5" cy="10.5" r="1" fill="currentColor" stroke="none"></circle>
                </svg>
            </button>

            <!-- Botão de Importar JSON -->
            <button id="importBtn" class="icon-btn" title="Importar Perfil (JSON)">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
            </button>

            <!-- Botão de Modo Escuro -->
            <button id="themeToggle" class="icon-btn" title="Toggle Dark Mode">
                <!-- Ícone de Lua -->
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </div>

    <div id="profileList" class="profile-list">
        <div class="empty-state">Nenhum perfil encontrado. Adicione um abaixo!</div>
    </div>

    <button id="addProfileBtn" class="main-action-btn">Add a profile</button>

    <div id="editorSection" class="editor-section hidden">
        <h3>Manage Profile</h3>

        <input type="hidden" id="editIndex" value="-1">

        <div class="form-group">
            <label>Profile Name</label>
            <input type="text" id="profileName" placeholder="e.g. Test1">
        </div>

        <div class="form-group">
            <label>Project</label>
            <select id="projectSelect">
                <option value="agent">Agent</option>
                <option value="fin">Fin</option>
                <option value="mar">MAR</option>
                <option value="connect">Connect</option>
                <option value="docs">Docs</option>
            </select>
        </div>

        <div class="form-group">
            <label>Login URL</label>
            <input type="text" id="loginUrl" value="http://localhost:3000">
        </div>

        <div class="form-group">
            <label>Email URL</label>
            <input type="text" id="emailUrl" value="https://mail.google.com">
        </div>

        <div class="form-group">
            <label>Login (Email)</label>
            <input type="text" id="loginInput" placeholder="email@example.com">
        </div>



        <div class="form-group">
            <label>Senha (Opcional)</label>
            <div class="password-wrapper">
                <input type="password" id="passwordInput" placeholder="Deixe vazio para usar a dinâmica">
                <button id="togglePasswordVisibility" class="icon-btn toggle-pw" type="button">
                    <svg id="eyeIcon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2"
                        fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
        </div>

        <div class="info-group">
            <span id="passwordLabel">Senha Dinâmica (Hoje):</span> <span id="passwordDisplay"></span>
            <div class="field-hint" style="font-size: 10px; color: var(--text-muted); margin-top: 4px;">
                (Se o campo acima estiver vazio, esta senha será usada)
            </div>
        </div>

        <div class="editor-actions">
            <button id="cancelBtn" class="secondary-btn">Cancel</button>
            <button id="saveBtn" class="primary-btn">Save Profile</button>
        </div>
    </div>

    <div id="status" class="status-msg"></div>

    <script src="popup.js"></script>
</body>

</html>
